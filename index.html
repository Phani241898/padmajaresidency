<!DOCTYPE html>
<html>
<head>
  <title>Apartment Data</title>
</head>
<body>

<h2>Flat Details</h2>

<input id="flat" placeholder="Flat No">
<input id="owner" placeholder="Owner Name">
<button onclick="addData()">Add</button>

<table border="1" id="table">
<tr><th>Flat</th><th>Owner</th></tr>
</table>

<button onclick="window.print()">Download as PDF</button>

<script>
function addData(){
  let flat = document.getElementById("flat").value;
  let owner = document.getElementById("owner").value;

  let row = document.createElement("tr");
  row.innerHTML = `<td>${flat}</td><td>${owner}</td>`;
  document.getElementById("table").appendChild(row);
}
</script>

</body>
</html>
