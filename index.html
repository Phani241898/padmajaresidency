<!DOCTYPE html>
<html>
<head>
    <title>Flat Details</title>
    <style>
        body { font-family: Arial; padding: 20px; }
        input { padding: 8px; margin: 5px; }
        button { padding: 8px 12px; }
        table { border-collapse: collapse; margin-top: 20px; width: 50%; }
        th, td { border: 1px solid black; padding: 10px; text-align: center; }
    </style>
</head>
<body>

<h2>Flat Details Entry</h2>

<input type="text" id="flat" placeholder="Flat Number">
<input type="text" id="owner" placeholder="Owner Name">
<button onclick="saveData()">Save</button>

<table>
    <thead>
        <tr>
            <th>Flat Number</th>
            <th>Owner Name</th>
        </tr>
    </thead>
    <tbody id="tableData"></tbody>
</table>

<script>
function saveData() {
    let flat = document.getElementById("flat").value.toUpperCase();
    let owner = document.getElementById("owner").value.toUpperCase();

    if (!flat || !owner) {
        alert("Enter all details");
        return;
    }

    let data = JSON.parse(localStorage.getItem("flats")) || [];
    data.push({flat, owner});

    // Sort ascending
    data.sort((a, b) => a.flat.localeCompare(b.flat));

    localStorage.setItem("flats", JSON.stringify(data));

    loadData();

    document.getElementById("flat").value = "";
    document.getElementById("owner").value = "";
}

function loadData() {
    let data = JSON.parse(localStorage.getItem("flats")) || [];
    let table = document.getElementById("tableData");
    table.innerHTML = "";

    data.forEach(item => {
        let row = `<tr>
            <td>${item.flat}</td>
            <td>${item.owner}</td>
        </tr>`;
        table.innerHTML += row;
    });
}

// Load data on page open
loadData();
</script>

</body>
</html>
