<!DOCTYPE html>
<html>
<head>
  <title>Apartment Management</title>
  <style>
    body { font-family: Arial; padding: 20px; }
    input, button { margin: 5px; padding: 8px; }
    table { border-collapse: collapse; margin-top: 20px; }
    td, th { border: 1px solid black; padding: 8px; }
  </style>
</head>

<body>

<h2>Flat Entry</h2>

<input id="flat" placeholder="Flat Number">
<input id="owner" placeholder="Owner Name">
<input id="phone" placeholder="Phone">
<input id="notes" placeholder="Notes">

<button onclick="submitData()">Submit</button>

<h2>All Data</h2>
<table id="table">
<tr>
<th>Flat</th><th>Owner</th><th>Phone</th><th>Notes</th>
</tr>
</table>

<button onclick="window.print()">Download PDF</button>

<script>
const scriptURL = "https://script.google.com/macros/s/AKfycbyQ1LmLzeAYS85xzamIdWC1rU0Io9K6eryOnhg07BSsdPZ73xoX769Upd1OGhW3LzQ7/exec";

// LOAD DATA
function loadData() {
  fetch(scriptURL)
    .then(res => res.json())
    .then(data => {
      const table = document.getElementById("table");

      // Clear old rows except header
      table.innerHTML = `
      <tr>
        <th>Flat</th><th>Owner</th><th>Phone</th><th>Notes</th>
      </tr>`;

      // Skip header row from sheet
      for (let i = 1; i < data.length; i++) {
        let row = `<tr>
          <td>${data[i][0]}</td>
          <td>${data[i][1]}</td>
          <td>${data[i][2]}</td>
          <td>${data[i][3]}</td>
        </tr>`;
        table.innerHTML += row;
      }
    });
}

// SUBMIT DATA
function submitData() {
  const data = {
    flat: document.getElementById("flat").value,
    owner: document.getElementById("owner").value,
    phone: document.getElementById("phone").value,
    notes: document.getElementById("notes").value
  };

  fetch(scriptURL, {
    method: "POST",
    body: JSON.stringify(data)
  })
  .then(res => {
    alert("Saved successfully!");
    loadData(); // refresh table
  })
  .catch(err => alert("Error"));
}

// Load data on page open
window.onload = loadData;
</script>

</body>
</html>
